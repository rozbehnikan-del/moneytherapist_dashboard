<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="money_therapist_dashboard">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function () {
      function postTelegramEvent(eventType, eventData) {
        const payload = { eventType: eventType, eventData: eventData };

        try {
          if (
            window.Telegram &&
            window.Telegram.WebView &&
            typeof window.Telegram.WebView.postEvent === 'function'
          ) {
            window.Telegram.WebView.postEvent(eventType, false, eventData);
            return;
          }
        } catch (_) {}

        try {
          if (
            window.TelegramWebviewProxy &&
            typeof window.TelegramWebviewProxy.postEvent === 'function'
          ) {
            window.TelegramWebviewProxy.postEvent(
              eventType,
              JSON.stringify(eventData)
            );
            return;
          }
        } catch (_) {}

        try {
          if (
            window.webkit &&
            window.webkit.messageHandlers &&
            window.webkit.messageHandlers.TelegramWebviewProxy
          ) {
            window.webkit.messageHandlers.TelegramWebviewProxy.postMessage(
              JSON.stringify(payload)
            );
            return;
          }
        } catch (_) {}

        try {
          if (window.parent) {
            window.parent.postMessage(JSON.stringify(payload), '*');
          }
        } catch (_) {}
      }

      function lockTelegramSwipe() {
        const webApp = window.Telegram && window.Telegram.WebApp;

        if (webApp) {
          try {
            webApp.ready();
            webApp.expand();
          } catch (_) {}

          try {
            if (typeof webApp.disableVerticalSwipes === 'function') {
              webApp.disableVerticalSwipes();
            }
          } catch (_) {}

          try {
            if (typeof webApp.enableClosingConfirmation === 'function') {
              webApp.enableClosingConfirmation();
            }
          } catch (_) {}
        }

        postTelegramEvent('web_app_setup_swipe_behavior', {
          allow_vertical_swipe: false
        });
      }

      window.moneyTherapistLockTelegramSwipe = lockTelegramSwipe;

      lockTelegramSwipe();
      window.addEventListener('load', lockTelegramSwipe);
      window.addEventListener('focus', lockTelegramSwipe);
      window.addEventListener('resize', lockTelegramSwipe);
      window.setTimeout(lockTelegramSwipe, 250);
      window.setTimeout(lockTelegramSwipe, 1000);
      window.setTimeout(lockTelegramSwipe, 2500);
    })();
  </script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-overflow-scrolling: auto;
    }

    body {
      position: fixed;
      inset: 0;
      width: 100%;
    }
  </style>

  <title>money_therapist_dashboard</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>

</body>
</html>
